apiVersion: ssu/v1
nlu:
  shortcuts:
    bundleIdentifier: com.hetzly.app
    intents:
    - metadata:
        name: RebootServerIntent_0
        title: Reboot Server
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }Reboot ${ServerEntity} with ${+applicationName}'
          - '{${+prefix} }Restart ${ServerEntity} with ${+applicationName}'
    - metadata:
        name: ServerStatusIntent_1
        title: Server Status
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }${+applicationName} server status'
          - '{${+prefix} }Check server status in ${+applicationName}'
    - metadata:
        name: MonthlyCostIntent_2
        title: Monthly Hetzner Cost
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }What''s my ${+applicationName} bill'
          - '{${+prefix} }${+applicationName} monthly cost'
    - metadata:
        name: +negative
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }${+standardAppShortcutNegatives}'
variables:
- name: +applicationName
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
    - Hetzly
- name: ServerEntity
  type: ssu/parameter
  definitions:
  - locale: en
    synomyms:
    - Hetzner Server
- name: +prefix
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/prefix/en.yaml
- name: +standardAppShortcutNegatives
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/standardAppShortcutNegatives/en.yaml
